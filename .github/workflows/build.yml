name: Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"
          SHA="${GITHUB_SHA::7}"
          echo "value=${BRANCH}-${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./devops/containers/app
          build-contexts: |
            app-src=./app
          target: prod
          push: true
          tags: ghcr.io/matuszeman/${{ github.repository }}:${{ steps.tag.outputs.value }}
